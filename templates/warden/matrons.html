<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Matrons</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <style>
        :root {
            --primary: #0f4c5c;
            --accent: #e6af2e;
            --dark: #1a1a2e;
        }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, var(--dark), #16213e);
            color: white;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }
        .header {
            background: var(--primary);
            padding: 40px;
            text-align: center;
            border-radius: 20px;
            margin-bottom: 40px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.5);
        }
        .header h1 {
            margin: 0;
            font-size: 3em;
            letter-spacing: 2px;
            text-shadow: 0 5px 15px rgba(0,0,0,0.6);
        }

        .container {
            max-width: 1300px;
            margin: auto;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 40px;
            border: 1px solid rgba(255,255,255,0.15);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            overflow: hidden;
            margin-bottom: 50px;
        }
        th {
            background: var(--primary);
            padding: 20px;
            text-align: left;
            font-size: 1.2em;
            font-weight: 600;
        }
        td {
            padding: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            vertical-align: middle;
        }
        tr:hover {
            background: rgba(255,255,255,0.1);
        }

        .action-buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
        }
        .btn-square {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px 20px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s ease;
            min-width: 110px;
            text-decoration: none;
        }
        .btn-edit {
            background: #27ae60;
            color: white;
        }
        .btn-delete {
            background: #e74c3c;
            color: white;
        }
        .btn-edit:hover {
            background: #219653;
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(39,174,96,0.4);
        }
        .btn-delete:hover {
            background: #c0392b;
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(231,76,60,0.4);
        }

        .no-data {
            text-align: center;
            padding: 80px;
            font-size: 1.6em;
            opacity: 0.7;
        }

        .add-btn {
            display: block;
            width: fit-content;
            margin: 50px auto 30px;
            background: var(--accent);
            color: var(--primary);
            padding: 18px 60px;
            border-radius: 50px;
            font-size: 1.5em;
            font-weight: 700;
            text-decoration: none;
            box-shadow: 0 15px 35px rgba(230,175,46,0.5);
            transition: 0.4s;
        }
        .add-btn:hover {
            transform: translateY(-8px);
            background: white;
            color: var(--primary);
        }

        .back {
            text-align: center;
            margin: 60px 0 40px;
        }
        .back a {
            display: inline-block;
            background: transparent;
            color: var(--accent);
            padding: 15px 50px;
            border: 3px solid var(--accent);
            border-radius: 50px;
            font-size: 1.4em;
            font-weight: bold;
            text-decoration: none;
            transition: all 0.4s ease;
        }
        .back a:hover {
            background: var(--accent);
            color: var(--primary);
            transform: scale(1.05);
            box-shadow: 0 15px 35px rgba(230,175,46,0.4);
        }

        /* MODAL */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal.show { display: flex; }
        .modal-card {
            background: white;
            color: #333;
            padding: 40px;
            border-radius: 20px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.6);
            position: relative;
        }
        .close {
            position: absolute;
            top: 20px;
            right: 30px;
            font-size: 35px;
            cursor: pointer;
            color: #aaa;
        }
        .close:hover { color: #000; }
        .modal h3 {
            color: var(--primary);
            text-align: center;
            font-size: 2em;
            margin-bottom: 30px;
        }
        input {
            width: 100%;
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 12px;
            font-size: 1.1em;
            margin: 12px 0;
        }
        .btn-primary {
            background: var(--primary);
            color: white;
            padding: 16px;
            border: none;
            border-radius: 50px;
            font-size: 1.2em;
            width: 100%;
            cursor: pointer;
            font-weight: 600;
            margin-top: 20px;
            transition: 0.3s;
        }
        .btn-primary:hover {
            background: #0a3d4a;
            transform: translateY(-3px);
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Matron Management</h1>
    </div>

    <div class="container">
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Username</th>
                    <th>Contact</th>
                    <th style="text-align:center;">Actions</th>
                </tr>
            </thead>
            <tbody>
                {% if db.matrons %}
                    {% for m in db.matrons %}
                    <tr>
                        <td>{{ m.id }}</td>
                        <td><strong>{{ m.name }}</strong></td>
                        <td>{{ m.username }}</td>
                        <td>{{ m.contact }}</td>
                        <td class="action-buttons">
                            <button class="btn-square btn-edit"
                                    data-id="{{ m.id }}"
                                    data-name="{{ m.name|e }}"
                                    data-username="{{ m.username|e }}"
                                    data-contact="{{ m.contact|e }}"
                                    onclick="editMatron(this)">
                                Edit
                            </button>
                            <a href="{{ url_for('warden_delete_matron', matron_id=m.id) }}" 
                               class="btn-square btn-delete"
                               onclick="return confirm('Delete {{ m.name }}? This cannot be undone.')">
                                Delete
                            </a>
                        </td>
                    </tr>
                    {% endfor %}
                {% else %}
                    <tr><td colspan="5" class="no-data">No matrons added yet.</td></tr>
                {% endif %}
            </tbody>
        </table>

        <button class="add-btn" onclick="openModal('addMatronModal')">
            Add New Matron
        </button>

        <div class="back">
            <a href="{{ url_for('warden_dashboard') }}">Back to Dashboard</a>
        </div>
    </div>

    <!-- Add Matron Modal -->
    <div id="addMatronModal" class="modal">
        <div class="modal-card">
            <span class="close" onclick="closeModal('addMatronModal')">×</span>
            <h3>Add New Matron</h3>
            <form method="POST" action="{{ url_for('warden_add_matron') }}">
                <input type="text" name="name" placeholder="Full Name" required>
                <input type="text" name="username" placeholder="Username (Login ID)" required>
                <input type="password" name="password" placeholder="Password" required>
                <input type="text" name="contact" placeholder="Contact Number" required>
                <button type="submit" class="btn-primary">Create Matron</button>
            </form>
        </div>
    </div>

    <!-- Edit Matron Modal -->
    <div id="editMatronModal" class="modal">
        <div class="modal-card">
            <span class="close" onclick="closeModal('editMatronModal')">×</span>
            <h3>Edit Matron</h3>
            <form method="POST" action="{{ url_for('warden_update_matron', matron_id=0) }}" id="editForm">
                <input type="hidden" name="id" id="edit_id">
                <input type="text" name="name" id="edit_name" placeholder="Full Name" required>
                <input type="text" name="username" id="edit_username" placeholder="Username" required>
                <input type="text" name="contact" id="edit_contact" placeholder="Contact Number" required>
                <button type="submit" class="btn-primary">Update Matron</button>
            </form>
        </div>
    </div>

    <script>
        function openModal(id) {
            document.getElementById(id).classList.add('show');
        }
        function closeModal(id) {
            document.getElementById(id).classList.remove('show');
        }

        function editMatron(btn) {
            const form = document.getElementById('editForm');
            form.action = `/warden/update_matron/${btn.dataset.id}`;
            document.getElementById('edit_id').value = btn.dataset.id;
            document.getElementById('edit_name').value = btn.dataset.name;
            document.getElementById('edit_username').value = btn.dataset.username;
            document.getElementById('edit_contact').value = btn.dataset.contact;
            openModal('editMatronModal');
        }
    </script>
</body>
</html>
