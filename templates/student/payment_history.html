<!DOCTYPE html>
<html>
<head>
    <title>Payment History</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background: linear-gradient(135deg, #0d6e71, #ff6b35); padding: 20px; }
        .container { max-width: 800px; margin: 40px auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 15px 40px rgba(0,0,0,0.3); }
        h1 { color: #0d6e71; text-align: center; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #0d6e71; color: white; }
        .back { display: block; text-align: center; margin-top: 30px; color: #d32f2f; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Payment History - {{ student.name }}</h1>
        <p>Room: {{ student.room }}</p>

        {% if payments %}
        <table>
            <tr>
                <th>Month</th>
                <th>Amount</th>
                <th>Status</th>
                <th>Paid On</th>
            </tr>
            {% for p in payments %}
            <tr>
                <td>{{ p.month_year }}</td>
                <td>₹{{ p.amount }}</td>
                <td><span style="color:green; font-weight:bold;">{{ p.status }}</span></td>
                <td>{{ p.paid_on }}</td>
            </tr>
            {% endfor %}
        </table>
        {% else %}
        <p style="text-align:center; color:#666; padding:40px;">No payments made yet.</p>
        {% endif %}

        <a href="{{ url_for('student_home') }}" class="back">Back to Home</a>
    </div>
</body>
</html>
