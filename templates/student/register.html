<!DOCTYPE html>
<html>
<head>
    <title>Student Registration - Hostel</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background: linear-gradient(135deg, #0d6e71, #ff6b35); min-height: 100vh; display: flex; align-items: center; justify-content: center; margin:0; }
        .card { width: 100%; max-width: 450px; background: white; padding: 40px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.3); }
        h2 { text-align: center; color: #0d6e71; margin-bottom: 30px; }
        input { width: 100%; padding: 14px; margin: 10px 0; border: 2px solid #ddd; border-radius: 10px; font-size: 16px; }
        input:focus { border-color: #0d6e71; outline: none; }
        button { width: 100%; padding: 14px; background: #0d6e71; color: white; border: none; border-radius: 10px; font-size: 18px; cursor: pointer; margin-top: 20px; }
        button:hover { background: #095957; }
        .login-link { text-align: center; margin-top: 20px; }
        .login-link a { color: #0d6e71; text-decoration: none; font-weight: 600; }
        .flash { padding: 15px; margin: 15px 0; border-radius: 10px; text-align: center; font-weight: bold; }
        .success { background: #d4edda; color: #155724; }
        .danger { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
<div class="card">
    <h2>Student Registration</h2>
    <form method="POST">
        <input type="text" name="name" placeholder="Full Name" required>
        <input type="email" name="email" placeholder="Email (will be your username)" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit">Register & Login</button>
    </form>
    <div class="login-link">
        <a href="{{ url_for('login') }}">Already registered? Login here</a>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="flash {{ category }}">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}
</div>
</body>
</html>
