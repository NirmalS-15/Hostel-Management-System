<!DOCTYPE html>
<html>
<head>
    <title>Request to Vacate Room</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Poppins', sans-serif; 
            background: linear-gradient(135deg, #0d6e71, #ff6b35); 
            padding: 20px; 
        }
        .container { 
            max-width: 800px; 
            margin: 60px auto; 
            background: white; 
            padding: 40px; 
            border-radius: 20px; 
            box-shadow: 0 15px 40px rgba(0,0,0,0.3); 
        }
        h1 { 
            color: #0d6e71; 
            text-align: center; 
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        .subtitle {
            text-align: center;
            color: #555;
            font-size: 1.2em;
            margin-bottom: 30px;
        }
        .info-box {
            background: #f0f8ff;
            padding: 20px;
            border-radius: 15px;
            margin: 25px 0;
            border-left: 6px solid #0d6e71;
        }
        .info-box strong {
            color: #0d6e71;
        }
        label {
            display: block;
            margin: 20px 0 10px;
            font-size: 1.3em;
            color: #0d6e71;
            font-weight: 600;
        }
        textarea {
            width: 100%;
            padding: 18px;
            border: 2px solid #ddd;
            border-radius: 15px;
            font-family: 'Poppins', sans-serif;
            font-size: 1.1em;
            resize: vertical;
            min-height: 140px;
        }
        textarea:focus {
            outline: none;
            border-color: #0d6e71;
            box-shadow: 0 0 10px rgba(13,110,113,0.2);
        }
        .btn-submit {
            display: block;
            width: 100%;
            padding: 18px;
            background: #0d6e71;
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 1.4em;
            font-weight: 600;
            cursor: pointer;
            margin: 30px 0;
            transition: 0.3s;
        }
        .btn-submit:hover {
            background: #0a5558;
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(13,110,113,0.4);
        }
        .back {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #d32f2f;
            font-weight: bold;
            font-size: 1.1em;
            text-decoration: none;
        }
        .back:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Request to Vacate Room</h1>
        <p class="subtitle">Submit your request to leave the hostel room</p>

        <div class="info-box">
            <p><strong>Name:</strong> {{ student.name }}</p>
            <p><strong>Current Room:</strong> {{ student.room }}</p>
        </div>

        <form method="POST">
            <label>Reason for Vacating Room</label>
            <textarea name="reason" placeholder="Please explain why you want to vacate the room..." required></textarea>
            
            <button type="submit" class="btn-submit">Submit Vacate Request</button>
        </form>

        <a href="{{ url_for('student_home') }}" class="back">Back to Home</a>
    </div>
</body>
</html>
